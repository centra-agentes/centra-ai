name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release:
        description: 'Marcar como release (actualiza latest_version en Supabase)'
        type: boolean
        default: false
        required: false

env:
  IMAGE: daimer003/centravigia

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build and push :latest
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:latest
          build-args: APP_VERSION=${{ steps.pkg.outputs.version }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

      - name: Update latest_version in Supabase
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true' }}
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          echo "Releasing v${VERSION} — updating Supabase catalog_agents..."
          HTTP_STATUS=$(curl -w "%{http_code}" -o /tmp/supabase_response.json \
            -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/catalog_agents?id=eq.centravigia" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"latest_version\": \"${VERSION}\"}")
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/supabase_response.json || true
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Supabase update failed"
            exit 1
          fi
          echo "Supabase updated: latest_version = ${VERSION}"
