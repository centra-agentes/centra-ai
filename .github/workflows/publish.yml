name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.9) — omit "v" prefix'
        required: true

env:
  IMAGE: daimer003/centravigia

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve tags and version
        id: meta
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_RELEASE=true
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            IS_RELEASE=true
          else
            VERSION=""
            IS_RELEASE=false
          fi

          if [[ "$IS_RELEASE" == "true" ]]; then
            printf "tags<<EOF\n${{ env.IMAGE }}:${VERSION}\n${{ env.IMAGE }}:latest\nEOF\n" >> $GITHUB_OUTPUT
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true"   >> $GITHUB_OUTPUT
          else
            printf "tags<<EOF\n${{ env.IMAGE }}:dev\nEOF\n" >> $GITHUB_OUTPUT
            echo "version="          >> $GITHUB_OUTPUT
            echo "is_release=false"  >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: APP_VERSION=${{ steps.meta.outputs.version || 'dev' }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

      - name: Verify versioned tag on Docker Hub
        if: steps.meta.outputs.is_release == 'true'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          echo "Verifying daimer003/centravigia:${VERSION} exists on Docker Hub..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -o /dev/null -w "%{http_code}" -s \
              "https://hub.docker.com/v2/repositories/daimer003/centravigia/tags/${VERSION}")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" == "200" ]; then
              echo "Tag :${VERSION} confirmed on Docker Hub"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: Tag :${VERSION} not found on Docker Hub after 5 attempts"
          exit 1

      - name: Update latest_version in Supabase
        if: steps.meta.outputs.is_release == 'true'
        run: |
          echo "Updating catalog_agents.latest_version to ${{ steps.meta.outputs.version }}"
          HTTP_STATUS=$(curl -w "%{http_code}" -o /tmp/supabase_response.json \
            -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/catalog_agents?id=eq.centravigia" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"latest_version\": \"${{ steps.meta.outputs.version }}\"}")
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/supabase_response.json || true
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ERROR: Supabase update failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Supabase updated successfully"
